runtime: python311
app_engine_apis: true

handlers:
- url: /stylesheets
  static_dir: stylesheets
  mime_type: text/css
  
- url: /(.*\.(otf|ttf))
  static_files: static/\1
  upload: static/(.*)

- url: /(.*\.(png|ico))
  static_files: static/images/\1
  upload: static/images/(.*\.(png|ico))

- url: /bootstrap/(.*)
  static_files: static/bootstrap/\1
  upload: static/bootstrap/.*

- url: /(.*\.(js))
  static_files: static/js/\1
  upload: static/js/(.*\.(js))
  
- url: /.*
  script: auto

