{% extends "base.html" %}

{% block title %} سورة {{ sura.name }} {% endblock %}

{% block content %}

<h1 class="text-center">
  سورة {{ sura.name }}
</h1>

<div class="text-center">
<p class="quran_font quran_section quran_text sura_section sura_container">
{% for aya in ayat %}
	<a name="{{ aya.number }}"></a>
     {{ aya.content }}
     ﴿{{ aya.number }}﴾
{% endfor %}
</p>
</div>
    
{% endblock %}
